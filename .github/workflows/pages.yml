name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build bookmarklets
        run: node scripts/build-bookmarklets.js

      - name: Prepare public files
        run: |
          set -eu
          rm -rf _site
          mkdir -p _site/css _site/js

          cp -a \
            .nojekyll \
            apple-touch-icon-180x180.png \
            beta.html \
            delete.html \
            favicon.ico \
            favicon.png \
            favicon.svg \
            favorite.html \
            follow.html \
            img \
            index.html \
            likes.html \
            likes2.html \
            tools.html \
            _site/

          cp -a css/main.css _site/css/
          cp -a \
            js/bookmarklet-builder.js \
            js/generated-bookmarklets.js \
            js/main.js \
            js/tools-bookmarklets.js \
            _site/js/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
